<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Icon: Box/Inventory -->
  <g transform="translate(400, 180)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="url(#accent)" opacity="0.2"/>
    <rect x="-50" y="-30" width="100" height="60" rx="4" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="url(#accent)" stroke-width="2"/>
    <rect x="-40" y="-50" width="20" height="20" rx="2" fill="url(#accent)" opacity="0.5"/>
    <rect x="20" y="-50" width="20" height="20" rx="2" fill="url(#accent)" opacity="0.5"/>
    <rect x="-40" y="30" width="20" height="20" rx="2" fill="url(#accent)" opacity="0.5"/>
    <rect x="20" y="30" width="20" height="20" rx="2" fill="url(#accent)" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" fill="#e4e4e7" font-family="system-ui, sans-serif" font-size="28" font-weight="600">Inventory Management System</text>
  <text x="400" y="310" text-anchor="middle" fill="#71717a" font-family="system-ui, sans-serif" font-size="14">Android App with Kotlin + Firebase</text>
  <!-- Tech badges -->
  <g transform="translate(200, 350)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#fff" opacity="0.1"/>
    <text x="40" y="19" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="12">Kotlin</text>
  </g>
  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#fff" opacity="0.1"/>
    <text x="45" y="19" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="12">Firebase</text>
  </g>
  <g transform="translate(410, 350)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#fff" opacity="0.1"/>
    <text x="50" y="19" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="12">Android</text>
  </g>
  <g transform="translate(530, 350)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="#fff" opacity="0.1"/>
    <text x="35" y="19" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="12">MVVM</text>
  </g>
</svg>